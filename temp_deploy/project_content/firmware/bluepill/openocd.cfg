# openocd.cfg
# Konfiguracja OpenOCD dla Raspberry Pi 5 i mikrokontrolera STM32F103 (SWD)
# Wykorzystuje nowoczesny sterownik linuxgpiod ze względu na nowy układ I/O (RP1) w RPi 5.

# 1. Konfiguracja interfejsu / adaptera
adapter driver linuxgpiod

# W jadrze Linux na RPi 5 kontroler GPIO RP1 jest reprezentowany zazwyczaj przez gpiochip4.
# Jesli Twoj system mapuje to inaczej, sprawdz komenda: gpiodetect
linuxgpiod gpiochip 4

# Mapowanie linii SWD (SWCLK -> GPIO 24, SWDIO -> GPIO 25)
# Numery linii odpowiadaja fizycznym numerom GPIO procesora
linuxgpiod swd_nums 24 25

# 2. Definicja transportu
transport select swd

# 3. Definicja docelowego mikrokontrolera (STM32F1x)
source [find target/stm32f1x.cfg]

# Domyślna prędkość adaptera (w kHz)
adapter speed 1000

# Opcje resetu (wiele klonów STM32 Blue Pill wymaga soft-resetu)
reset_config none separate

init
targets
# Komendy do wgrania oprogramowania (odkomentuj w konsoli podczas uruchamiania):
# program firmware.bin verify reset exit
