; PlatformIO Project Configuration File for Seeed Studio XIAO RP2350
; Rdzeń: Earle Philhower arduino-pico (RP2040/RP2350)
; https://github.com/earlephilhower/arduino-pico

[env:seeed_xiao_rp2350]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2350
framework = arduino
board_build.core = earlephilhower

; Flagi kompilacji
build_flags =
    -D PICO_STDIO_USB=1
    -D USE_TINYUSB=0
    -D CFG_TUSB_CONFIG_FILE=\"tusb_config.h\"
    -Wno-unused-variable

; Protokół wgrywania: uf2 przez bootloader USB
; Po podłączeniu XIAO do RPi5: przytrzymaj BOOT + naciśnij RESET,
; pojawi się dysk masowy RPI-RP2, PlatformIO wgra .uf2 automatycznie.
upload_protocol = picotool

; Opcjonalnie: Monitor szeregowy przez USB CDC
monitor_speed = 115200
monitor_port = /dev/ttyACM0

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

